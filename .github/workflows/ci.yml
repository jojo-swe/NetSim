name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @netsim/shared

      - name: Type-check API
        run: npx tsc -p apps/api/tsconfig.json --noEmit

      - name: Type-check web
        run: npx tsc -p apps/web/tsconfig.json --noEmit

      - name: Run shared tests
        run: npm run test -w @netsim/shared

      - name: Run API tests
        run: npm run test -w apps/api

      - name: Run web tests
        run: npm run test -w apps/web
